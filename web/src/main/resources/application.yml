logging:
  level:
    org:
      springframework:
        security: TRACE

plataanywherechat:
  web:
    application:
      host: localhost
      port: 3120
    http:
      address: http://localhost:3120
  message:
    application:
      host: localhost
      port: 3121
    ws:
      address: ws://localhost:3121

auth-service:
  jwt:
    secret: ${AUTH_SERVICE_JWT_SECRET:this-is-a-local-auth-service-secret-32-bytes}

server:
  port: 3120

spring:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:pacweb;
    username: sa
    password:
  sql:
    init:
      mode: always
      platform: h2
  jpa:
    generate-ddl: true
    show-sql: true
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        use_sql_comments: true
  data:
    mongodb:
      host: localhost
      port: 27017
      database: pac
      username: localtest
      password: localtest
    repositories:
      enabled: false
  main:
    allow-bean-definition-overriding: true
